server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # DNS resolver is injected at startup from /etc/resolv.conf by start.sh.
    # Placeholder is replaced with the container's actual nameserver IP.
    resolver __DNS_RESOLVER__ valid=30s ipv6=off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── API proxy — route /api/ and /auth/ to the API service via Railway
    # private networking. This makes https://openmail.win/api/... work, so
    # code snippets and SDK examples can use the branded domain.
    location /api/ {
        set $api_upstream http://api.railway.internal:3001;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        # Long timeouts for ElectricSQL SSE streams
        proxy_read_timeout 3600s;
        proxy_send_timeout 300s;
        proxy_buffering off;
        # Forward auth headers and cookies
        proxy_pass_header Set-Cookie;
        proxy_pass_header Authorization;
    }

    location /auth/ {
        set $api_upstream http://api.railway.internal:3001;
        proxy_pass $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass_header Set-Cookie;
        proxy_read_timeout 60s;
    }

    # ── Docs SPA — serve from /docs/ subdirectory (built with base: '/docs/')
    location /docs {
        # Redirect /docs → /docs/ so React Router gets a clean base
        return 301 /docs/;
    }

    location /docs/ {
        try_files $uri $uri/ /docs/index.html;
    }

    # ── Web dashboard SPA — all other routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proper long-term caching for hashed static assets
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No cache for the app shell HTML files so updates land immediately
    location ~* \.html$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Plain text files (robots.txt, llms.txt)
    # Plain text and Markdown — short cache, CORS open so LLMs can fetch directly
    location ~* \.(txt|md)$ {
        add_header Cache-Control "public, max-age=3600";
        add_header Content-Type "text/plain; charset=utf-8";
        add_header Access-Control-Allow-Origin "*";
    }

    # Sitemap with correct XML content-type
    location = /sitemap.xml {
        add_header Content-Type "application/xml; charset=utf-8";
        add_header Cache-Control "public, max-age=0, must-revalidate";
    }

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript font/woff2;
    gzip_min_length 256;
}
