version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: openmail
      POSTGRES_USER: openmail
      POSTGRES_PASSWORD: openmail_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openmail"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://openmail:openmail_password@postgres:5432/openmail
      REDIS_URL: redis://redis:6379
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-change-me-to-a-random-32-char-secret}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3001}
      RESEND_API_KEY: ${RESEND_API_KEY}
      WEB_URL: ${WEB_URL:-http://localhost:5173}
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://openmail:openmail_password@postgres:5432/openmail
      REDIS_URL: redis://redis:6379
      RESEND_API_KEY: ${RESEND_API_KEY}
      TRACKER_URL: ${TRACKER_URL:-http://tracker:3003}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@openmail.dev}
      DEFAULT_FROM_NAME: ${DEFAULT_FROM_NAME:-OpenMail}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  tracker:
    build:
      context: .
      dockerfile: tracker/Dockerfile
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: postgresql://openmail:openmail_password@postgres:5432/openmail
      PORT: 3003
    depends_on:
      postgres:
        condition: service_healthy

  mcp:
    build:
      context: .
      dockerfile: mcp/Dockerfile
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      API_URL: http://api:3001
      PORT: 3002
    depends_on:
      - api

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_API_URL: ""
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
